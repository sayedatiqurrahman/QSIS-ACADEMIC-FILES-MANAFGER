name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Build deployment folder
        run: |
          mkdir -p _site
          cp index.html cached.html history.html contributors.html routine.html _site/
          cp -r css js assets _site/
          cp manifest.json sw.js _site/
          cp CNAME _site/ 2>/dev/null || true
          # Copy SEO / verification files
          mkdir -p _site/_verification
          cp _verification/* _site/_verification/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
