name: File Review & Validation

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'upload_academic_files/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Fetch PR head commit for diff
        run: |
          git fetch origin +refs/pull/${{ github.event.pull_request.number }}/head:pr-head --force

      - name: Verify Changes are in upload_academic_files only
        id: check_paths
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const base = context.payload.pull_request.base.sha;
            const files = execSync(`git diff --name-only ${base} pr-head`).toString().trim().split('\n').filter(Boolean);
            const badFiles = files.filter(f => !f.startsWith('upload_academic_files/'));
            if (badFiles.length > 0) {
              core.setFailed(`Changes outside upload_academic_files/ detected: ${badFiles.join(', ')}`);
            }

      - name: Validate File Locations (must be in allowed folders only)
        id: location_check
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const base = context.payload.pull_request.base.sha;
            const files = execSync(`git diff --name-only ${base} pr-head`).toString().trim().split('\n').filter(Boolean);

            const semPattern = /^upload_academic_files\/([^/]+?)(?:-semister|\d)/;
            const allowed = [
              // sheet/{course-code}/any-file
              /^upload_academic_files\/[^/]+-semister\/sheet\/[^/]+\/.+$/,
              // Previous Question ({N} Semester)/{year}/{Mid|Final}/any-file  OR  /{year}/any-file  OR  direct files
              /^upload_academic_files\/[^/]+-semister\/Previous Question \(\d+ Semester\)\/(20\d{2}\/(Mid|Final)\/.+|20\d{2}\/.+|[^/]+)$/,
              // NOTES/any-file
              /^upload_academic_files\/[^/]+-semister\/NOTES\/.+$/,
              // Syllabus/any-file
              /^upload_academic_files\/[^/]+-semister\/Syllabus\/.+$/,
              // kitab/{book-name}/any-file (top-level, any semester)
              /^upload_academic_files\/kitab\/[^/]+\/.+$/,
            ];

            const bad = files.filter(f => !allowed.some(p => p.test(f)));

            if (bad.length > 0) {
              core.setFailed(`Files in wrong locations:\n${bad.join('\n')}\n\nAllowed folders:\n- {semester}/sheet/{course-code}/\n- {semester}/Previous Question ({N} Semester)/{year}/{Mid|Final}/\n- {semester}/NOTES/\n- {semester}/Syllabus/`);
            } else {
              console.log('All files in valid locations ✓');
            }

      - name: Verify Contributor Info (QSIS ID, Full Name, WhatsApp Required)
        id: contributor
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';

            // Try multiple formats in order of preference
            let name = '', qsId = '', whatsapp = '';

            // 1) Strict template format: ### Header \n <!-- --> \n value
            const strictName = body.match(/### Your Name\s*\n\s*<!--[\s\S]*?-->\s*\n\s*([^\n\r]+)/i);
            const strictQs   = body.match(/### QSIS ID Number\s*\n\s*<!--[\s\S]*?-->\s*\n\s*([^\n\r]+)/i);
            const strictWa   = body.match(/### WhatsApp Number\s*\n\s*<!--[\s\S]*?-->\s*\n\s*([^\n\r]+)/i);
            if (strictName) name = strictName[1].trim();
            if (strictQs)   qsId = strictQs[1].trim();
            if (strictWa)   whatsapp = strictWa[1].trim();

            // 2) Loose label formats: "Name: value", "QSIS: value", "WhatsApp: value"
            if (!name) {
              const n = body.match(/(?:Your )?Name\s*[:：]\s*([^\n\r]+)/i);
              if (n) name = n[1].trim();
            }
            if (!qsId) {
              const q = body.match(/(?:QSIS|ID)\s*(?:Number|ID|No)?\s*[:：]\s*([^\n\r]+)/i);
              if (q) qsId = q[1].trim();
            }
            if (!whatsapp) {
              const w = body.match(/(?:WhatsApp|Phone|Mobile|Contact)\s*(?:Number|No)?\s*[:：]\s*([^\n\r]+)/i);
              if (w) whatsapp = w[1].trim();
            }

            // 3) Fallback: pattern-detect from raw body
            // QSIS ID format: Q followed by 6 digits, or just 6 digits starting with 25
            if (!qsId) {
              const qFallback = body.match(/\b(Q\d{6}|\d{6})\b/);
              if (qFallback) qsId = qFallback[1];
            }
            // WhatsApp/BD phone: +8801 followed by 9 digits, or 01 followed by 9 digits
            if (!whatsapp) {
              const wFallback = body.match(/(\+?8801\d{9}|01\d{9})/);
              if (wFallback) whatsapp = wFallback[1];
            }
            // If QSID and phone found but no name, take text before QSIS ID
            if (!name && qsId) {
              const idx = body.indexOf(qsId);
              let before = body.substring(0, idx).trim();
              if (before && before.length < 100 && !before.includes('###') && !before.match(/[:：]/)) {
                const lines = before.split('\n').filter(l => l.trim());
                name = lines.length > 0 ? lines[lines.length - 1].trim() : '';
              }
            }

            const missing = [];
            if (!qsId || qsId === '') missing.push('QSIS ID Number');
            if (!name || name === '') missing.push('Full Name');
            if (!whatsapp || whatsapp === '') missing.push('WhatsApp Number');

            core.setOutput('qs_id', qsId);
            core.setOutput('name', name);
            core.setOutput('whatsapp', whatsapp);
            core.setOutput('missing', missing.length > 0 ? 'true' : 'false');
            core.setOutput('missing_fields', missing.join(', '));

            if (missing.length > 0) {
              core.setFailed(`Missing required contributor fields: ${missing.join(', ')}`);
            }

      - name: Comment - Missing Info
        if: steps.contributor.outputs.missing == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const missing = '${{ steps.contributor.outputs.missing_fields }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## ❌ Missing Information\n\nPlease fill in these fields at the top of your PR description:\n\n- **Your Name** — as you want it to appear on the site\n- **QSIS ID Number** — your student/QSIS ID\n- **WhatsApp Number** — with country code\n\n> ⚠️ QSIS ID is required. Submissions without a valid QSIS ID will not be approved.\n\n---\n*This is an automated check by QSIS-ARMS Bot.*`
            });

      - name: Comment - Info Verified
        if: steps.contributor.outputs.missing == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const name = `${{ steps.contributor.outputs.name }}`;
            const qsId = `${{ steps.contributor.outputs.qs_id }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## ✅ Thanks ${name}!\n\n| Field | Value |\n|-------|-------|\n| **Name** | ${name} |\n| **QSIS ID** | ${qsId} |\n\nYour files will be reviewed and merged. Credit will appear on the [QSIS-ARMS contributors page](https://qsis-arms.eu.cc/contributors.html).`
            });

      - name: Validate File Structure
        id: validate
        run: |
          echo "## File Validation Report" > report.md
          echo "" >> report.md

          base='${{ github.event.pull_request.base.sha }}'
          git diff --name-only "$base" pr-head > /tmp/changed_files.txt 2>/dev/null || true

          echo "### Files Changed:" >> report.md
          echo '```' >> report.md

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "- $file" >> report.md
          done < /tmp/changed_files.txt

          echo '```' >> report.md

          cat report.md >> $GITHUB_STEP_SUMMARY

      - name: Comment Validation Report on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('report.md', 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes('File Validation Report'));
            const msg = report + '\n\n---\n*This is an automated check by QSIS-ARMS Bot.*';
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: msg
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: msg
              });
            }

      - name: Auto-Merge (if all checks pass)
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pullNumber = context.issue.number;
            await github.rest.pulls.merge({
              owner,
              repo,
              pull_number: pullNumber,
              merge_method: 'squash',
              commit_title: `Auto-merged: ${context.payload.pull_request.title}`
            });
            console.log(`✅ PR #${pullNumber} auto-merged successfully.`);
