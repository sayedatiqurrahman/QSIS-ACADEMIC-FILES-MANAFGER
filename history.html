<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Read History - QSIS</title>
  <link rel="icon" type="image/png" href="assets/arms-logo.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#22c55e" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <nav class="navbar">
      <div class="nav-container">
        <div class="nav-brand">
          <a href="index.html" style="text-decoration:none;display:flex;align-items:center;gap:12px">
            <img src="assets/arms-logo.png" alt="QSIS-ARMS" class="nav-logo" />
            <div class="nav-title">
              <h1>QSIS-ARMS</h1>
              <span class="nav-subtitle">Read History</span>
            </div>
          </a>
        </div>
        <div class="nav-actions">
          <button class="btn-icon theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
          <a href="index.html" class="btn btn-sm"><i class="fas fa-home"></i> Home</a>
        </div>
      </div>
    </nav>

    <main class="main-content" style="max-width:800px;margin:0 auto;padding:20px">
      <div class="page-header">
        <h2><i class="fas fa-clock"></i> Read History</h2>
        <div class="page-actions">
          <button class="btn btn-sm btn-outline" onclick="clearHistory()" style="border-color:var(--danger);color:var(--danger)">
            <i class="fas fa-trash"></i> Clear All
          </button>
        </div>
      </div>
      <div id="historyList" style="display:flex;flex-direction:column;gap:8px">
        <div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Loading...</p></div>
      </div>
    </main>

    <div id="toast" class="toast"></div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/github.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => { loadTheme(); waitForDB().then(loadHistory); });

    function waitForDB() { return new Promise(r => { const c = setInterval(() => { if (DB && DB.db) { clearInterval(c); r(); } }, 100); }); }

    function loadTheme() { const s = localStorage.getItem('qsis-theme') || 'dark'; document.documentElement.setAttribute('data-theme', s); const i = document.querySelector('.theme-toggle i'); if (i) i.className = s === 'dark' ? 'fas fa-moon' : 'fas fa-sun'; }
    function toggleTheme() { const c = document.documentElement.getAttribute('data-theme'); const n = c === 'light' ? 'dark' : 'light'; document.documentElement.setAttribute('data-theme', n); localStorage.setItem('qsis-theme', n); const i = document.querySelector('.theme-toggle i'); if (i) i.className = n === 'dark' ? 'fas fa-moon' : 'fas fa-sun'; }

    function showToast(msg, type) { const t = document.getElementById('toast'); t.textContent = msg; t.className = 'toast ' + type + ' show'; clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 3500); }

    function getFileIcon(mime) {
      if (mime === 'image') return '<i class="fas fa-file-image" style="color:#34d399"></i>';
      if (mime === 'pdf') return '<i class="fas fa-file-pdf" style="color:#ef4444"></i>';
      if (mime === 'doc') return '<i class="fas fa-file-word" style="color:#3b82f6"></i>';
      return '<i class="fas fa-file" style="color:var(--text2)"></i>';
    }

    function timeAgo(ts) { const d = Date.now() - ts; if (d < 60000) return 'Just now'; if (d < 3600000) return Math.floor(d / 60000) + 'm ago'; if (d < 86400000) return Math.floor(d / 3600000) + 'h ago'; return Math.floor(d / 86400000) + 'd ago'; }

    function esc(t) { const d = document.createElement('div'); d.textContent = t || ''; return d.innerHTML; }

    async function loadHistory() {
      const list = document.getElementById('historyList');
      try {
        const items = await DB.historyGetAll();
        if (!items || items.length === 0) {
          list.innerHTML = '<div class="empty-state"><i class="fas fa-clock"></i><p>No read history yet. Open a file to get started.</p><a href="index.html" class="btn btn-glow btn-sm" style="margin-top:12px"><i class="fas fa-home"></i> Go to Files</a></div>';
          return;
        }
        list.innerHTML = items.map(item => {
          const id = DB.makeId(item.path);
          return `<div class="list-item">
            <div class="list-item-icon">${getFileIcon(item.mimeType)}</div>
            <div class="list-item-info">
              <div class="list-item-name">${esc(item.name)}</div>
              <div class="list-item-meta">${esc(item.path)} &middot; ${timeAgo(item.lastRead)}</div>
            </div>
            <div class="list-item-actions">
              <button class="btn-action" title="Open" onclick="openItem('${esc(item.path)}','${esc(item.mimeType)}','${esc(item.rawUrl)}')"><i class="fas fa-eye"></i></button>
              <button class="btn-action" title="Remove" onclick="removeHistory('${id}')"><i class="fas fa-trash"></i></button>
            </div>
          </div>`;
        }).join('');
      } catch (err) {
        list.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Failed to load history.</p></div>';
      }
    }

    function openItem(path, mime, rawUrl) {
      if (!rawUrl) rawUrl = `https://raw.githubusercontent.com/${GITHUB.owner}/${GITHUB.repo}/${GITHUB.branch}/${CONFIG.uploadPath}/${path}`;
      window.location.href = `index.html?v=open&path=${encodeURIComponent(path)}&mime=${mime}`;
    }

    async function removeHistory(id) {
      await DB.historyDelete(id);
      showToast('Removed', 'info');
      loadHistory();
    }

    async function clearHistory() {
      if (!confirm('Clear all read history?')) return;
      await DB.historyClear();
      showToast('History cleared', 'info');
      loadHistory();
    }
  </script>
</body>
</html>
