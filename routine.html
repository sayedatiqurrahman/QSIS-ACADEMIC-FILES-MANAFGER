<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Routine | QSIS-ARMS</title>
  <link rel="icon" type="image/png" href="assets/arms-logo.png" />
  <meta name="theme-color" content="#22c55e" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <nav class="navbar">
      <div class="nav-container">
        <div class="nav-brand">
          <a href="index.html" style="text-decoration:none;display:flex;align-items:center;gap:12px">
            <img src="assets/arms-logo.png" alt="QSIS-ARMS" class="nav-logo" />
            <div class="nav-title">
              <h1>QSIS-ARMS</h1>
              <span class="nav-subtitle">Routine Manager</span>
            </div>
          </a>
        </div>
        <button class="nav-hamburger" onclick="toggleNav()" aria-label="Menu">
          <i class="fas fa-bars"></i>
        </button>
        <div class="nav-actions" id="navActions">
          <a href="contributors.html" class="nav-link"><i class="fas fa-users"></i> Contributors</a>
          <a href="routine.html" class="nav-link" style="color:var(--primary)"><i class="fas fa-calendar-alt"></i> Routine</a>
          <div class="nav-mobile-row">
            <a href="https://github.com/sayedatiqurrahman/QSIS-ACADEMIC-FILES-MANAFGER" target="_blank" title="Star us on GitHub">
              <i class="fas fa-star"></i> <span id="navStars">-</span>
            </a>
            <button class="theme-toggle" onclick="toggleTheme()" title="Theme">
              <i class="fas fa-moon"></i>
            </button>
            <a href="cached.html" title="Downloads"><i class="fas fa-download"></i></a>
            <a href="index.html" title="Home"><i class="fas fa-home"></i></a>
          </div>
        </div>
      </div>
    </nav>

    <main class="main-content" style="max-width:1100px;margin:0 auto;padding:20px">
      <div class="page-header">
        <h2><i class="fas fa-calendar-alt"></i> Routine Manager</h2>
        <p class="page-subtitle">Class timetable & exam schedule management</p>
      </div>

      <div class="routine-controls">
        <select id="routineSemester" class="form-select">
          <option value="">Select Semester</option>
        </select>
        <span id="currentSemesterLabel" class="current-sem-label"></span>
      </div>

      <!-- Tabs -->
      <div class="routine-tabs">
        <button class="routine-tab-btn active" data-tab="tabClass">
          <i class="fas fa-chalkboard-teacher"></i> Class Routine
        </button>
        <button class="routine-tab-btn" data-tab="tabExam">
          <i class="fas fa-file-alt"></i> Exam Schedule
        </button>
      </div>

      <!-- Class Routine Tab -->
      <div id="tabClass" class="routine-tab" style="display:">
        <div class="routine-panel">
          <div class="routine-panel-header">
            <h3><i class="fas fa-clock"></i> Weekly Timetable</h3>
            <div class="slot-manager">
              <input type="text" id="newSlotInput" placeholder="e.g. 9:00-9:55" class="form-input" style="width:140px" />
              <button id="addSlotBtn" class="btn btn-sm" title="Add time slot">+ Slot</button>
            </div>
          </div>

          <div id="routineGrid">
            <div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Loading...</p></div>
          </div>

          <details class="routine-details">
            <summary><i class="fas fa-plus-circle"></i> Add Class Entry</summary>
            <form id="addClassForm" class="routine-form">
              <div class="form-row">
                <select name="day" required>
                  <option value="">Day</option>
                  <option>Saturday</option>
                  <option>Sunday</option>
                  <option>Monday</option>
                  <option>Tuesday</option>
                  <option>Wednesday</option>
                  <option>Thursday</option>
                </select>
                <input type="text" name="slot" placeholder="Time slot (e.g. 8:00-8:55)" required />
                <input type="text" name="subject" placeholder="Subject name" required />
                <input type="text" name="teacher" placeholder="Teacher name" />
                <input type="text" name="room" placeholder="Room" />
                <select name="type">
                  <option value="Lecture">Lecture</option>
                  <option value="Lab">Lab</option>
                </select>
                <button type="submit" class="btn btn-glow btn-sm"><i class="fas fa-plus"></i> Add</button>
              </div>
            </form>
          </details>
        </div>
      </div>

      <!-- Exam Schedule Tab -->
      <div id="tabExam" class="routine-tab" style="display:none">
        <div class="routine-panel">
          <h3><i class="fas fa-file-alt"></i> Exam & Break Schedule</h3>

          <div id="examSchedule">
            <div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Loading...</p></div>
          </div>

          <details class="routine-details">
            <summary><i class="fas fa-plus-circle"></i> Add Exam / Break</summary>
            <form id="addExamForm" class="routine-form">
              <div class="form-row">
                <input type="text" name="examName" placeholder="Exam/Break name (e.g. Midterm, Break)" required />
                <input type="date" name="examStart" required />
                <input type="date" name="examEnd" required />
              </div>
              <div class="form-row">
                <input type="text" name="examSubjects" placeholder="Subjects (comma-separated)" style="flex:2" />
                <button type="submit" class="btn btn-glow btn-sm"><i class="fas fa-plus"></i> Add</button>
              </div>
            </form>
          </details>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="footer-content">
        <div class="footer-logos">
          <a href="https://programming-light.eu.cc" target="_blank" rel="noopener"><img src="assets/pl-logo.png" alt="Programming Light" class="footer-logo footer-logo-pl" /></a>
          <span class="footer-logo-plus"><i class="fas fa-plus"></i></span>
          <img src="assets/qsis-logo.jpg" alt="QSIS" class="footer-logo" />
        </div>
        <a href="https://github.com/sayedatiqurrahman/QSIS-ACADEMIC-FILES-MANAFGER" target="_blank" class="footer-star">
          <i class="fas fa-star"></i> <span id="footerStars">-</span> Stars on GitHub
        </a>
      </div>
    </footer>
  </div>

  <script src="js/config.js"></script>
  <script src="js/github.js"></script>
  <script src="js/routine.js"></script>
  <script>
    function toggleNav() { document.getElementById('navActions').classList.toggle('nav-open') }
    function toggleTheme() {
      const html = document.documentElement
      const theme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'
      html.setAttribute('data-theme', theme)
      localStorage.setItem('theme', theme)
    }
    ;(function () {
      const saved = localStorage.getItem('theme')
      if (saved) document.documentElement.setAttribute('data-theme', saved)
    })()
  </script>
</body>
</html>
